<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>IT Kamianets</title>
		<base href="/" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			try {
				const storedMode = localStorage.getItem('app-mode');
				const preferredMode =
					storedMode === 'dark' || storedMode === 'light'
						? storedMode
						: window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
				document.documentElement.setAttribute('data-mode', preferredMode);
			} catch {}
		</script>

		<meta
			name="description"
			content="IT Kamianets — web and mobile app development, IT education, internships, and digital solutions for businesses in Kamianets-Podilskyi and beyond."
		/>

			name="keywords"
			content="IT Kamianets, web development, mobile app development, Angular, Node.js, programming, internships, IT education, Kamianets-Podilskyi, digital solutions"
		/>
		<meta name="author" content="IT Kamianets Team" />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

		<meta itemprop="name" content="IT Kamianets" />

			content="Web and mobile app development, IT education, internships, and digital products by IT Kamianets."
